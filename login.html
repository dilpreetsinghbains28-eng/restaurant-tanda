<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Galaxy Restaurant</title>
<script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
    } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
    }
    function toggleDarkMode() {
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
            localStorage.setItem('theme', 'light');
            document.querySelectorAll('.dark-icon').forEach(icon => icon.textContent = 'dark_mode');
        } else {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
            localStorage.setItem('theme', 'dark');
            document.querySelectorAll('.dark-icon').forEach(icon => icon.textContent = 'light_mode');
        }
    }
    window.addEventListener('DOMContentLoaded', () => {
        if (document.documentElement.classList.contains('dark')) {
            document.querySelectorAll('.dark-icon').forEach(icon => icon.textContent = 'light_mode');
        }
    });
</script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="mobile.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand': '#944217',
                        'brand-light': '#ffdbcc',
                        'surface': '#fff8f6',
                        'outline': '#e8d5ce'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff8f6; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .dark body, .dark .login-page-body { background-color: #0F0F13 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col login-page-body">
    <!-- Simple Header -->
    <header class="p-6 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-brand font-bold text-xl hover:opacity-80 transition-opacity w-fit mx-auto sm:mx-0">
            <span class="material-symbols-outlined text-3xl">restaurant</span>
            Galaxy Restaurant
        </a>
        <button onclick="toggleDarkMode()" class="p-2 text-gray-500 hover:text-brand transition-colors rounded-full hover:bg-gray-100">
            <span class="material-symbols-outlined dark-icon">dark_mode</span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border border-brand-light fade-in">
            <!-- Tabs -->
            <div class="flex">
                <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-4 font-bold text-brand border-b-2 border-brand bg-brand/5 transition-all">Login</button>
                <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-4 font-bold text-gray-500 border-b border-outline hover:bg-gray-50 transition-all">Register</button>
            </div>
            
            <div class="p-8">
                <h2 id="formTitle" class="text-2xl font-bold text-gray-800 mb-6 text-center">Welcome Back!</h2>
                
                <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
                    <div id="nameField" class="hidden">
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">Full Name</label>
                        <input id="authName" type="text" placeholder="John Doe" class="w-full px-4 py-3 rounded-xl border border-outline focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">Phone Number</label>
                        <input id="authPhone" type="tel" required pattern="^[6-9]\d{9}$" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="10-digit number starting with 6-9" class="w-full px-4 py-3 rounded-xl border border-outline focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">Password</label>
                        <input id="authPassword" type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-outline focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition-all">
                    </div>
                    
                    <p id="authError" class="text-red-500 text-sm hidden text-center bg-red-50 p-2 rounded-lg border border-red-100"></p>
                    <p id="authSuccess" class="text-green-600 text-sm hidden text-center bg-green-50 p-2 rounded-lg border border-green-100"></p>
                    
                    <button id="submitBtn" type="submit" class="w-full bg-brand text-white py-3 mt-4 rounded-xl font-bold shadow-md hover:bg-[#7a3003] transition-all active:scale-[0.98]">
                        Login Securely
                    </button>
                </form>

                <div class="mt-6 text-center text-sm text-gray-500">
                    <p>Secure authentication required to place orders and book tables.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isRegisterMode = false;
        const isStatic = window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';
        
        // Check if user is already logged in
        if (localStorage.getItem('galaxy_token')) {
            window.location.href = 'index.html';
        }

        // Handle URL parameters for post-login redirection
        const urlParams = new URLSearchParams(window.location.search);
        const redirectAction = urlParams.get('redirect');

        function switchTab(mode) {
            isRegisterMode = mode === 'register';
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const nameField = document.getElementById('nameField');
            const btn = document.getElementById('submitBtn');
            const title = document.getElementById('formTitle');
            
            if (isRegisterMode) {
                tabRegister.className = "flex-1 py-4 font-bold text-brand border-b-2 border-brand bg-brand/5 transition-all";
                tabLogin.className = "flex-1 py-4 font-bold text-gray-500 border-b border-outline hover:bg-gray-50 transition-all";
                nameField.classList.remove('hidden');
                document.getElementById('authName').required = true;
                btn.textContent = "Create Account";
                title.textContent = "Join Galaxy Restaurant";
            } else {
                tabLogin.className = "flex-1 py-4 font-bold text-brand border-b-2 border-brand bg-brand/5 transition-all";
                tabRegister.className = "flex-1 py-4 font-bold text-gray-500 border-b border-outline hover:bg-gray-50 transition-all";
                nameField.classList.add('hidden');
                document.getElementById('authName').required = false;
                btn.textContent = "Login Securely";
                title.textContent = "Welcome Back!";
            }
            document.getElementById('authError').classList.add('hidden');
            document.getElementById('authSuccess').classList.add('hidden');
        }

        function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('authError');
            const successEl = document.getElementById('authSuccess');
            
            const phone = document.getElementById('authPhone').value;
            const password = document.getElementById('authPassword').value;
            const name = document.getElementById('authName').value;

            btn.disabled = true;
            btn.textContent = "Please wait...";
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');

            if (isStatic) {
                // Static hosting (GitHub Pages) — localStorage-based auth
                setTimeout(() => {
                    if (isRegisterMode) {
                        // Save user to localStorage
                        const users = JSON.parse(localStorage.getItem('galaxy_users') || '[]');
                        if (users.find(u => u.phone === phone)) {
                            errorEl.textContent = 'This phone number is already registered. Please login.';
                            errorEl.classList.remove('hidden');
                            btn.disabled = false;
                            btn.textContent = "Create Account";
                            return;
                        }
                        users.push({ name, phone, password });
                        localStorage.setItem('galaxy_users', JSON.stringify(users));
                        
                        // Create token
                        const token = btoa(JSON.stringify({ name, phone, id: 'user_' + Date.now() }));
                        localStorage.setItem('galaxy_token', token);
                        
                        successEl.textContent = '✅ Account created! Redirecting...';
                        successEl.classList.remove('hidden');
                    } else {
                        // Login — check localStorage
                        const users = JSON.parse(localStorage.getItem('galaxy_users') || '[]');
                        const user = users.find(u => u.phone === phone && u.password === password);
                        
                        if (user) {
                            const token = btoa(JSON.stringify({ name: user.name, phone: user.phone, id: 'user_' + Date.now() }));
                            localStorage.setItem('galaxy_token', token);
                            successEl.textContent = '✅ Login successful! Redirecting...';
                            successEl.classList.remove('hidden');
                        } else {
                            errorEl.textContent = 'Invalid phone number or password. Register first if you are new.';
                            errorEl.classList.remove('hidden');
                            btn.disabled = false;
                            btn.textContent = "Login Securely";
                            return;
                        }
                    }

                    // Redirect after success
                    setTimeout(() => {
                        if (redirectAction === 'cart') {
                            window.location.href = 'menu.html';
                        } else if (redirectAction === 'booking') {
                            window.location.href = 'index.html';
                        } else if (redirectAction === 'contact') {
                            window.location.href = 'contact.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1000);
                }, 500);
            } else {
                // Backend available — use API
                const endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
                const body = isRegisterMode ? { name, phone, password } : { phone, password };

                fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        localStorage.setItem('galaxy_token', data.token);
                        successEl.textContent = '✅ ' + (isRegisterMode ? 'Account created!' : 'Login successful!') + ' Redirecting...';
                        successEl.classList.remove('hidden');
                        
                        setTimeout(() => {
                            if (redirectAction === 'cart') {
                                window.location.href = 'menu.html';
                            } else if (redirectAction === 'booking') {
                                window.location.href = 'index.html';
                            } else if (redirectAction === 'contact') {
                                window.location.href = 'contact.html';
                            } else {
                                window.location.href = 'index.html';
                            }
                        }, 1000);
                    } else {
                        errorEl.textContent = data.message || "Authentication failed.";
                        errorEl.classList.remove('hidden');
                        btn.disabled = false;
                        btn.textContent = isRegisterMode ? "Create Account" : "Login Securely";
                    }
                })
                .catch(() => {
                    errorEl.textContent = "Connection error. Please try again.";
                    errorEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = isRegisterMode ? "Create Account" : "Login Securely";
                });
            }
        }
    </script>
</body>
</html>
